services:
  postgres:
    image: postgres:16
    container_name: langflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-langflow_db}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow} -d ${POSTGRES_DB:-langflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langflow-network

  langflow:
    image: langflowai/langflow:latest
    container_name: langflow-app
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow_secret}@postgres:5432/${POSTGRES_DB:-langflow_db}
      - LANGFLOW_COMPONENTS_PATH=/app/custom_components
      - LANGFLOW_LOG_LEVEL=${LANGFLOW_LOG_LEVEL:-INFO}
      - LANGFLOW_WORKER_TIMEOUT=${LANGFLOW_WORKER_TIMEOUT:-300}
    volumes:
      - ./components:/app/custom_components:ro
      - langflow_data:/app/langflow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - langflow-network

networks:
  langflow-network:
    driver: bridge
    name: langflow-network

volumes:
  postgres_data:
    driver: local
  langflow_data:
    driver: local
